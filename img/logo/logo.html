<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Logo Site</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
}

body {
    background: #0a0a0a;
    color: #fff;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
}

/* HEADER */
header {
    padding: 20px;
    text-align: center;
    border-bottom: 1px solid rgba(255,255,255,0.08);
}

/* MAIN */
main {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
}

/* FOOTER */
footer {
    padding: 15px;
    text-align: center;
    border-top: 1px solid rgba(255,255,255,0.08);
}

/* контейнер */
.logo-wrap {
    width: 320px;
    height: 320px;
    position: relative;
    overflow: hidden;
}

/* сам логотип */
.logo {
    width: 100%;
    height: 100%;
    object-fit: contain;
    opacity: 0;
    filter: brightness(0.3);
    animation: fadeCycle 6s ease-in-out infinite;
}

/* эффект "сборки" через маску */
.logo-wrap::before {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(
        120deg,
        transparent 0%,
        transparent 40%,
        #fff 50%,
        transparent 60%,
        transparent 100%
    );
    mix-blend-mode: overlay;
    transform: translateX(-120%);
    animation: sweep 6s ease-in-out infinite;
}

/* яркая вспышка */
.logo-wrap::after {
    content: "";
    position: absolute;
    inset: 0;
    background: radial-gradient(circle, rgba(255,215,120,0.6), transparent 60%);
    opacity: 0;
    animation: flash 6s ease-in-out infinite;
}

/* появление → пик → затухание */
@keyframes fadeCycle {
    0% {
        opacity: 0;
        transform: scale(0.9);
        filter: brightness(0.3);
    }
    20% {
        opacity: 1;
        transform: scale(1);
        filter: brightness(2.5) drop-shadow(0 0 20px #d4af37);
    }
    40% {
        filter: brightness(3.2) drop-shadow(0 0 30px #d4af37);
    }
    70% {
        filter: brightness(1.2) drop-shadow(0 0 8px #d4af37);
    }
    100% {
        opacity: 0;
        transform: scale(1.05);
        filter: brightness(0.2);
    }
}

/* проход света (как сборка) */
@keyframes sweep {
    0% { transform: translateX(-120%); }
    30% { transform: translateX(120%); }
    100% { transform: translateX(120%); }
}

/* вспышка */
@keyframes flash {
    0%, 25%, 100% { opacity: 0; }
    30% { opacity: 1; }
    50% { opacity: 0.3; }
}

</style>
</head>

<body>

<header>
    HEADER
</header>

<main>

    <div class="logo-wrap">
        <img src="big-logo-gold_RGB.svg" class="logo">
    </div>

</main>

<footer>
    FOOTER
</footer>

</body>
</html>
